# redactor "secrets" profile - credentials only, nothing else.
#   redactor -p secrets --diff app.log
#   redactor -p secrets -i src/config.py .env
#   redactor -p secrets --check $(git diff --cached --name-only) || exit 1
#
# Where the per-service profiles (webserver, sshd, ...) also pseudonymize IPs,
# hosts and users to keep a log readable, this one touches ONLY things that are
# secret: it is the "scrub the credentials before I paste this publicly" profile.

@secret     # vendor tokens (AWS, GitHub, Stripe, SendGrid, ...), JWTs, bearer/
            # basic auth, cookies, session ids, password hashes, private-key
            # blocks, and password=/token= assignments. See below.

# @field redacts a named field's VALUE whatever shape it has - the credentials
# that have no recognizable shape of their own, only a known key.  @secret's
# built-in assignment rule covers the classic key=value; @field adds JSON
# ("authorization":"...") and header (Authorization: Bearer ...) forms, and lets
# you name the keys your own app uses.
@field authorization x-api-key x-auth-token api_key apikey access_token
@field refresh_token client_secret password passwd pwd secret token session

# --- what @secret catches -------------------------------------------------
#
#   vendor tokens    AKIA..., ghp_..., sk_live_..., SG.xxx.yyy, hvs.xxx, ...
#   JWTs             eyJhbGci....eyJzdWIm...signature        -> [SECRET]
#   HTTP auth        Authorization: Bearer <token>           -> Bearer [SECRET]
#                    Authorization: Basic <base64 user:pw>   -> Basic  [SECRET]
#   cookies          Cookie:/Set-Cookie: ...                 -> [SECRET]
#   session ids      PHPSESSID=..., JSESSIONID=...           -> [SECRET]
#   password hashes  $6$rounds=...$salt$hash (crackable)     -> [SECRET]
#   private keys     -----BEGIN ... PRIVATE KEY-----         -> whole block gone
#   query strings    /admin?token=abc&api_key=xyz            -> ...=[SECRET]

# --- opt-in: PII, not credentials -----------------------------------------
# Both gate on a checksum (Luhn / mod-97), so a random 16-digit id or AT.. string
# is left alone. Uncomment if you are scrubbing data that may carry them:
#@creditcard        # 4111 1111 1111 1111 -> [CARD]
#@iban              # DE89 3704 0044 0532 0130 00 -> [IBAN]

# --- tuning ---------------------------------------------------------------
# @secret is trigger-happy by design: in code, "token = get_token()" becomes
# "token = [SECRET]". That is the safe direction. Check with --diff or --stats
# before you commit to -i.
