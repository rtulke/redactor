# redactor rules for sshd / auth.log
#   redactor -p sshd /var/log/auth.log
#
# Typical lines:
#
#   Apr 12 10:03:22 web01 sshd[1234]: Accepted publickey for robert from
#     192.168.1.50 port 54321 ssh2: RSA SHA256:47DEQpj8HBSa+/TImW+5JCeuQeR...
#   Apr 12 10:03:25 web01 sshd[1234]: Failed password for invalid user admin
#     from 203.0.113.9 port 22 ssh2
#   Apr 12 10:03:30 web01 sshd[1234]: pam_unix(sshd:session): session opened
#     for user robert by (uid=0)

@ip                     # source IPs (yours and the attackers')
@hostname               # the syslog hostname field (web01)
@sshkey                 # SHA256:... fingerprint = one specific key = one person
@user                   # the local account name

# The fingerprint is the subtle one: it is not a secret, but it is a stable
# identifier. Two logs sharing SHA256:47DEQ... prove the same person touched
# both. @sshkey pseudonymizes it to sshkey1, so the correlation *inside* your
# log survives while the link to the real key is cut.

# --- accounts -------------------------------------------------------------
# @user without arguments only knows the account you are running as. Name the
# real ones, otherwise "Accepted publickey for robert" keeps the name:
#@user robert alice bob svc-deploy

# --- attempted usernames --------------------------------------------------
# "Failed password for invalid user admin" - attacker-supplied, so it says
# nothing about you. Usually worth KEEPING for analysis. Enable only if you
# consider the attempted names sensitive:
#/(?i)(invalid user )\S+/        "\1USER"

# --- port numbers ---------------------------------------------------------
# Source ports are rarely sensitive; a fixed listen port might reveal a
# non-standard setup:
#/(?i)( port )\d+/               "\1PORT"
