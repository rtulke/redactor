# redactor rules for vsftpd / proftpd / pure-ftpd
#   redactor -p ftp /var/log/vsftpd.log
#
# Typical vsftpd lines:
#
#   Mon Apr 12 10:03:22 2024 [pid 1234] [robert] OK LOGIN: Client "192.168.1.50"
#   Mon Apr 12 10:03:25 2024 [pid 1234] [robert] OK DOWNLOAD:
#     Client "192.168.1.50", "/home/robert/kunden/offerte-mueller.pdf", 88231 bytes

@ip                     # client addresses
@user                   # the [robert] field
@path                   # /home/<user>/... -> /home/user1/...
@secret                 # plaintext passwords if the daemon ever logs them
@hostname

# --- file names are the real leak here ------------------------------------
# FTP logs every transferred path. "offerte-mueller.pdf" names your customer;
# the directory tree describes your business. @path only anonymizes the
# /home/<user>/ prefix - the rest of the path survives on purpose, because it
# is usually what you kept the log for.
#
# If the whole tree is sensitive, replace the quoted path wholesale:
#/(?i)(OK (?:DOWNLOAD|UPLOAD|DELETE|MKDIR|RENAME)[^"]*"[^"]*",\s*)"[^"]*"/   "\1\"FILE\""
#
# ...or collapse just your project root:
#@path /home/robert/kunden/     CUSTOMERS/
#@path /srv/ftp/                FTPROOT/

# --- accounts -------------------------------------------------------------
#@user robert alice ftpuser

# --- anonymous FTP --------------------------------------------------------
# Anonymous logins put the client's e-mail in the password field:
#/(?i)(PASS )\S+@\S+/    "\1ANON"
