# redactor rules for ISC dhcpd / dnsmasq
#   redactor -p dhcpd /var/log/syslog
#
# Typical lines:
#
#   Apr 12 10:03:22 gw dhcpd: DHCPACK on 192.168.1.50 to 00:11:22:33:44:55
#     (roberts-laptop) via eth0
#   Apr 12 10:03:22 gw dnsmasq-dhcp[900]: DHCPACK(eth0) 192.168.1.50
#     00:11:22:33:44:55 roberts-laptop

@ip                     # leased addresses
@mac                    # see below - this is the big one here
@hostname               # the syslog hostname field

# --- why @mac matters more here than elsewhere ----------------------------
# A MAC is a permanent, globally unique device identifier, and its first three
# octets (the OUI) name the manufacturer - "00:11:22" tells the reader you run
# Cisco/Apple/whatever. It follows the device across networks forever. In a
# DHCP log the MAC is usually MORE identifying than the IP.
# @mac maps it to 02:00:00:xx:xx:xx (a locally-administered range, so the
# pseudonym is obviously fake and its OUI means nothing).

# --- client hostnames -----------------------------------------------------
# THE GAP: dhcpd logs the name the client announced - "roberts-laptop",
# "iphone-von-anna". That is a person's name, and redactor cannot detect it
# automatically: it is arbitrary free text with no distinguishing shape.
# You have to list them, or match the log's syntax around them.
#
# ISC dhcpd puts it in parentheses after the MAC:
#/(?i)(DHCP(?:ACK|OFFER|REQUEST|NAK)[^(]*)\([^)]*\)/     "\1(CLIENT)"
#
# ...or just name the devices you know:
#@word roberts-laptop    device1
#@word iphone-von-anna   device2

# --- interfaces -----------------------------------------------------------
# Interface names can hint at your topology (vlan42-guest, wg0):
#/(?i)( via )\S+/        "\1IFACE"
