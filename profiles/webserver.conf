# redactor rules for apache / nginx
#   redactor -p webserver /var/log/apache2/access.log
#
# Typical combined-format line:
#
#   192.168.1.50 - robert [12/Apr/2024:10:03:22 +0200] "GET /admin?token=abc HTTP/1.1"
#   200 1234 "https://intranet.corp/x" "Mozilla/5.0 (X11; Linux x86_64) ..."
#    ^client IP  ^auth user            ^query string    ^referer          ^user agent
#
# Every one of those five fields can identify someone.

@ip                     # client IP + upstream IPs in the error log
@secret                 # ?token=..., Cookie:, Authorization: Basic ...
@uri                    # referer: https://intranet.corp/x -> https://host1/x
@hostname               # vhost / server name if it is this machine
@path                   # /home/<user>/... in error-log paths

# --- the HTTP auth user (3rd field: "IP - robert [date]") ------------------
# List the accounts you actually have; @user matches them as whole words.
#@user robert alice bob

# --- X-Forwarded-For / X-Real-IP ------------------------------------------
# Already covered by @ip, but if you log them as a header and want the whole
# chain gone rather than pseudonymized:
#/(?i)(X-(?:Forwarded-For|Real-IP)\s*:\s*).*/    "\1[REDACTED]"

# --- user agent -----------------------------------------------------------
# Fingerprints the client and leaks internal software versions. Off by default
# because it destroys most of the analytic value of an access log.
#/(?i)"Mozilla[^"]*"/            "\"UA\""

# --- known-sensitive paths ------------------------------------------------
# If your URL space itself is secret (customer names in the path, etc.):
#/\/customers\/[^\/\s"]+/        "/customers/CUSTOMER"
#/\/api\/v[0-9]+\/users\/\d+/    "/api/v1/users/ID"
