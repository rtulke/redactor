# redactor rules for postfix / dovecot / exim
#   redactor -p mail /var/log/mail.log
#
# You did not ask for mail, but mail logs leak more personal data per line than
# any other standard service - every line names a real human.
#
# Typical postfix lines:
#
#   Apr 12 10:03:22 mail postfix/smtpd[1234]: connect from
#     kunde.firma.ch[203.0.113.9]
#   Apr 12 10:03:23 mail postfix/qmgr[900]: A1B2C3D4: from=<robert@company.com>,
#     size=4711, nrcpt=1 (queue active)
#   Apr 12 10:03:24 mail postfix/smtp[1234]: A1B2C3D4: to=<kunde@firma.ch>,
#     relay=mx.firma.ch[203.0.113.9]:25, delay=1.2, status=sent (250 OK)
#   Apr 12 10:03:25 mail dovecot: imap-login: Login: user=<robert>,
#     method=PLAIN, rip=192.168.1.50

@email                  # from=<...>, to=<...>, user=<...>
@ip                     # client, relay and rip= addresses
@hostname
@secret                 # SASL credentials if they ever hit the log
@user

# --- queue IDs are a correlation handle -----------------------------------
# A1B2C3D4 ties "from=" and "to=" together across lines. That is usually what
# you WANT to keep (it is how you follow a mail through the queue) and it is
# meaningless outside your server - so it stays by default.
# If you are sharing with someone who should not even see the grouping:
#/(?i)\b([0-9A-F]{8,12}):/       "QUEUEID:"

# --- Message-IDs ----------------------------------------------------------
# message-id=<CAF1a2b3@mail.corp.local> contains a hostname and is a globally
# unique handle to one specific mail:
#/(?i)(message-id=)<[^>]*>/      "\1<MSGID>"

# --- subjects -------------------------------------------------------------
# Some setups (amavis, rspamd) log the subject. Always sensitive:
#/(?i)(Subject:\s*).*$/          "\1[REDACTED]"

# --- remote domains -------------------------------------------------------
# @email maps whole addresses (kunde@firma.ch -> redacted1@example.com), so the
# customer's domain is gone with it. But relay=mx.firma.ch survives unless you
# enable @uri-style host handling or name it:
#@hostname mx.firma.ch
