# redactor rules for config files, dotfiles and .env
#   redactor -p configfiles --diff /etc/nginx/nginx.conf
#   redactor -p configfiles -i --map .redactor.map .env docker-compose.yml
#
# Config files leak differently from logs: a log leaks WHO did what, a config
# leaks the credentials themselves.

@secret                 # the whole credential family, see below
@path                   # /home/<user>/... in paths
@hostname
@uri                    # postgres://user:pass@db.corp/app -> postgres://host1/app
@email

# --- what @secret catches in config files ---------------------------------
#
#   /etc/shadow          robert:$6$rounds=5000$salt$hash...   -> $6$... = [SECRET]
#   .htpasswd            robert:$apr1$xyz$abc...              -> hash    = [SECRET]
#   .env                 API_KEY=sk-abc123                    -> [SECRET]
#   .aws/credentials     aws_secret_access_key = wJalr...     -> [SECRET]
#   .netrc               password hunter2                     -> [SECRET]
#   snmpd.conf           rocommunity public 10.0.0.0/8        -> [SECRET]
#   any                  -----BEGIN RSA PRIVATE KEY-----      -> whole block gone
#
# Password hashes count as secrets: a $6$ hash from /etc/shadow is crackable
# offline, so publishing it is publishing the password with a delay.

# --- connection strings ---------------------------------------------------
# @uri drops the userinfo part, which is where DSN credentials live:
#   postgres://app:s3cr3t@db.corp.local:5432/prod
#     -> postgres://host1:5432/prod
# The password AND the internal DB host are both gone, the shape stays readable.

# --- things @secret deliberately does NOT touch ---------------------------
# Listen ports, cipher suites, worker counts: not sensitive, and redacting them
# would make the config useless as a thing to share and ask about.

# --- your own project paths -----------------------------------------------
# Remember: a bare rule "/home/alice/myproject/ X" would be parsed as a /regex/,
# because it starts and ends with a slash. Use @path:
#@path /home/alice/myproject/  PROJECT/
#@path /srv/www/kunde-x/     SITEROOT/

# --- internal domains -----------------------------------------------------
#company.com            example.com
#corp.local             internal.example
#@hostname web01 db01.corp.local mail.corp.local

# --- false positives to expect --------------------------------------------
# In CODE, the assignment rule is trigger-happy on purpose:
#   token = get_token()          ->  token = [SECRET]
#   password_field.label = "PW"  ->  password_field.label = [SECRET]
# Check with --stats or --diff before committing to -i.
